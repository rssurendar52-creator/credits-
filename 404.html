<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/credits-/">
    <link rel="canonical" href="/credits-/">
  </head>
  <body>
    <script>
      // If you're here, the page redirect didn't work automatically
      // Try redirecting manually
      if (window.location.pathname !== '/credits-/') {
        window.location.href = '/credits-/';
      }
    </script>
  </body>
</html>
